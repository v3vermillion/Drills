name: Daily reminder push

# Optional: sends a daily Web Push reminder to your installed PWA.
# Requires three repository secrets (Settings → Secrets and variables → Actions):
#   VAPID_PRIVATE       — the private key printed when the app was built
#   DRILL_SUBSCRIPTION  — the push subscription JSON from Settings inside the app
#   (VAPID_PUBLIC is committed in app.js and passed through below)
# Adjust the cron to your timezone (cron is UTC). 13:30 UTC ≈ 7:30am Mountain.

on:
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch:
    inputs:
      message:
        description: "Notification text"
        required: false

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm --prefix tools install --omit=dev --silent
      - name: Send push
        env:
          VAPID_PUBLIC: "BJKynbDamOi4l7iMWFproKjW8_OQGJLM1cemrUfex0p8Rhl_q5qh6FZu0K9yPlgBoj-nzCWtHcgJ3DG1qu5WH6g"
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          DRILL_SUBSCRIPTION: ${{ secrets.DRILL_SUBSCRIPTION }}
          DRILL_MESSAGE: ${{ github.event.inputs.message || 'I am here, Lord. Bring this day to God.' }}
        run: node tools/send-push.mjs
